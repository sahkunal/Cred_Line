[package]
name = "cred-line-tests"
version = "0.1.0"
edition = "2021"

[dependencies]
flowpay = { path = "../programs/flowpay" }
flowscore = { path = "../programs/flowscore", features = ["exports"] }
flowbadge = { path = "../programs/flowbadge" }
flowlend = { path = "../programs/flowlend" }

anchor-lang = "0.31.1"

[dev-dependencies]
litesvm = "0.10.0"
litesvm-token = "0.10.0"
solana-keypair = "^3.0.1"
solana-signer = "^3.0.1"
solana-message = "^3.0.1"
